<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Planner — WBS · Gantt · PERT</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0e10;--bg2:#18181c;--bg3:#222228;--bg4:#2c2c34;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--text:#f0f0f2;--text2:#a0a0b0;--text3:#606072;--accent:#4f8ef7;--accent2:#2d6adb;--green:#3ecf8e;--amber:#f5a623;--red:#e85555;--purple:#9b6dff;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;--r:6px;--rl:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;overflow:hidden}
.app{display:grid;grid-template-rows:52px 1fr;height:100vh}
.topbar{display:flex;align-items:center;gap:10px;padding:0 20px;border-bottom:1px solid var(--border);background:var(--bg2);z-index:10}
.logo{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--accent);letter-spacing:.08em;white-space:nowrap}
.proj-switcher{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:4px 10px;cursor:pointer;font-size:12px;color:var(--text);min-width:0;max-width:200px}
.proj-switcher span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.proj-switcher:hover{border-color:var(--accent);color:var(--accent)}
.topbar-right{margin-left:auto;display:flex;gap:6px;align-items:center}
.save-badge{font-size:10px;font-family:var(--mono);color:var(--text3);padding:3px 8px;border-radius:4px}
.save-badge.ok{color:var(--green)}
.main{display:grid;grid-template-columns:200px 1fr;overflow:hidden}
.sidebar{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.nav-sec{padding:14px 16px 5px;font-size:9px;font-family:var(--mono);letter-spacing:.1em;color:var(--text3);text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 16px;cursor:pointer;color:var(--text2);font-size:12px;transition:all .12s;user-select:none}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--bg3);color:var(--accent);border-left:2px solid var(--accent);padding-left:14px}
.nav-item .nav-count{margin-left:auto;font-size:9px;font-family:var(--mono);color:var(--text3)}
.sidebar-footer{margin-top:auto;padding:10px;border-top:1px solid var(--border)}
.content{overflow-y:auto;padding:24px 28px;position:relative}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:var(--r);border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:12px;font-family:var(--sans);cursor:pointer;transition:all .12s;white-space:nowrap}
.btn:hover{background:var(--bg4);color:var(--text);border-color:rgba(255,255,255,.2)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:var(--accent2);border-color:var(--accent2)}
.btn-ghost{background:transparent;border-color:transparent;color:var(--text3)}
.btn-ghost:hover{background:var(--bg3);color:var(--text2);border-color:var(--border)}
.btn-danger{background:transparent;border-color:transparent;color:var(--red)}
.btn-danger:hover{background:rgba(232,85,85,.1);border-color:rgba(232,85,85,.3)}
.btn-gcal{background:rgba(62,207,142,.12);color:var(--green);border-color:rgba(62,207,142,.3)}
.btn-gcal:hover{background:rgba(62,207,142,.22)}
.btn-sm{padding:4px 9px;font-size:11px}
.btn-xs{padding:2px 7px;font-size:10px}
.btn-icon{padding:4px;width:26px;height:26px;justify-content:center;flex-shrink:0}
.badge{display:inline-flex;align-items:center;padding:2px 6px;border-radius:3px;font-size:9px;font-family:var(--mono);font-weight:500;letter-spacing:.03em}
.badge-cp{background:rgba(79,142,247,.15);color:#7fb0fa;border:1px solid rgba(79,142,247,.3)}
.badge-example{background:rgba(245,166,35,.1);color:var(--amber);border:1px solid rgba(245,166,35,.25)}
.progress-bar{height:4px;border-radius:2px;background:var(--bg3);overflow:hidden;margin:6px 0}
.progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--green));transition:width .3s}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.metric{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:14px}
.metric-val{font-family:var(--mono);font-size:26px;font-weight:500}
.metric-lbl{font-size:10px;color:var(--text3);margin-top:3px;text-transform:uppercase;letter-spacing:.05em}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:8px}
.ph-title{font-size:17px;font-weight:500}
.ph-actions{display:flex;gap:6px;flex-wrap:wrap}

/* ── Phase ring + header ── */
.wbs-phase{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);margin-bottom:8px;overflow:visible}
.wbs-ph-hdr{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;user-select:none;border-radius:var(--rl)}
.wbs-ph-hdr:hover{background:var(--bg3)}
.phase-ring-wrap{position:relative;width:28px;height:28px;flex-shrink:0}
.phase-ring-wrap svg{position:absolute;top:0;left:0;transform:rotate(-90deg)}
.phase-ring-dot{width:8px;height:8px;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.phase-name-edit{background:transparent;border:none;font-size:13px;font-weight:500;color:var(--text);font-family:var(--sans);flex:1;min-width:0;cursor:text;padding:0}
.phase-name-edit:focus{outline:1px solid var(--accent);border-radius:3px;background:var(--bg3);padding:1px 4px}
.phase-meta{font-size:10px;color:var(--text3);font-family:var(--mono);white-space:nowrap}
.exp-icon{color:var(--text3);font-size:9px;transition:transform .15s;flex-shrink:0}
.exp-icon.open{transform:rotate(90deg)}

/* ── Phase notes ── */
.phase-notes-area{padding:4px 14px 10px 50px}
.phase-notes-input{width:100%;background:transparent;border:none;border-bottom:1px solid var(--border);font-size:11px;color:var(--text2);font-family:var(--sans);font-style:italic;padding:4px 0;resize:none;line-height:1.5}
.phase-notes-input:focus{outline:none;border-bottom-color:var(--accent);color:var(--text)}
.phase-notes-input::placeholder{color:var(--text3)}

/* ── Task rows ── */
.wbs-tasks{padding:0 10px 8px 10px}
.wbs-task{display:flex;align-items:center;gap:7px;padding:6px 10px;border-radius:var(--r);margin-bottom:2px;cursor:grab;position:relative}
.wbs-task:hover{background:var(--bg3)}
.wbs-task.done .task-name-edit{text-decoration:line-through;color:var(--text3)}
.wbs-task.drag-over{border-top:2px solid var(--accent);border-radius:0}
.wbs-task.dragging{opacity:.4;cursor:grabbing}
.drag-handle{color:var(--text3);font-size:12px;cursor:grab;flex-shrink:0;opacity:0;transition:opacity .1s;user-select:none;padding:0 2px}
.wbs-task:hover .drag-handle{opacity:1}
.task-check{appearance:none;width:14px;height:14px;border:1px solid var(--border2);border-radius:3px;cursor:pointer;flex-shrink:0;background:transparent;position:relative}
.task-check:checked{background:var(--green);border-color:var(--green)}
.task-check:checked::after{content:'✓';position:absolute;top:-1px;left:1px;font-size:10px;color:#000;font-weight:700}
.task-check.inprogress{border-color:var(--amber);background:rgba(245,166,35,.15)}
.task-id-lbl{font-family:var(--mono);font-size:9px;color:var(--text3);width:24px;flex-shrink:0}
.task-name-edit{background:transparent;border:none;font-size:12px;color:var(--text);font-family:var(--sans);flex:1;min-width:60px;cursor:text;padding:0}
.task-name-edit:focus{outline:1px solid var(--accent);border-radius:3px;background:var(--bg3);padding:1px 4px}
.task-name-edit.inprogress{color:var(--amber)}
.task-days-pill{display:inline-flex;align-items:center;gap:3px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:2px 7px;font-family:var(--mono);font-size:10px;color:var(--text2);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:border-color .12s}
.task-days-pill:hover{border-color:var(--accent);color:var(--accent)}
.task-date-chip{display:inline-flex;align-items:center;gap:3px;font-family:var(--mono);font-size:9px;color:var(--text3);white-space:nowrap;flex-shrink:0}
.task-date-chip.overdue{color:var(--red)}
.task-date-chip.today{color:var(--amber)}
.task-date-chip.upcoming{color:var(--green)}
.task-notes-row{padding:2px 10px 4px 76px;font-size:11px;color:var(--text3);font-style:italic}

/* ── Status dot ── */
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ── Gantt ── */
.gantt-outer{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.g-hdr{display:flex;border-bottom:1px solid var(--border2);background:var(--bg3)}
.g-name-col{width:190px;flex-shrink:0;padding:8px 14px;font-size:9px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.06em;border-right:1px solid var(--border)}
.g-bar-area{flex:1;position:relative;overflow:hidden}
.g-body{overflow-x:hidden}
.g-ph-row{display:flex;align-items:center;border-bottom:1px solid rgba(255,255,255,.04);background:rgba(255,255,255,.015)}
.g-task-row{display:flex;align-items:center;border-bottom:1px solid rgba(255,255,255,.03);transition:background .1s}
.g-task-row:hover{background:rgba(255,255,255,.02)}
.g-task-row.done-row .g-bar{opacity:.5}
.g-name{width:190px;flex-shrink:0;padding:5px 14px;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;border-right:1px solid var(--border)}
.g-ph-name{font-weight:500;font-size:11px}
.g-bar-wrap{flex:1;position:relative;height:28px}
.g-bar{position:absolute;height:14px;top:7px;border-radius:3px;display:flex;align-items:center;padding:0 5px;font-size:8px;font-family:var(--mono);color:rgba(255,255,255,.9);white-space:nowrap;overflow:hidden;min-width:2px}
.g-today-line{position:absolute;top:0;bottom:0;width:1px;background:rgba(245,166,35,.6);z-index:2;pointer-events:none}
.g-today-lbl{position:absolute;top:2px;font-size:8px;font-family:var(--mono);color:var(--amber);background:var(--bg3);padding:0 3px;border-radius:2px;white-space:nowrap;z-index:2}
.g-date-lbl{position:absolute;top:0;display:flex;flex-direction:column;align-items:center}
.g-date-line{width:1px;height:16px;background:var(--border)}
.g-date-txt{font-size:8px;font-family:var(--mono);color:var(--text3);margin-top:2px;white-space:nowrap}

/* ── PERT ── */
.pert-tbl{width:100%;border-collapse:collapse;font-size:12px}
.pert-tbl th{padding:9px 10px;text-align:left;font-size:9px;font-family:var(--mono);letter-spacing:.08em;color:var(--text3);text-transform:uppercase;border-bottom:1px solid var(--border2);background:var(--bg3)}
.pert-tbl td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.pert-tbl tr:last-child td{border-bottom:none}
.pert-tbl tr.is-cp{background:rgba(79,142,247,.04)}
.pert-tbl tr.is-cp td:first-child{border-left:2px solid var(--accent)}
.pert-inp{background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:3px 6px;font-size:11px;font-family:var(--mono);color:var(--text);width:52px;text-align:center}
.pert-inp:focus{outline:none;border-color:var(--accent)}
.result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0}
.result-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:14px;text-align:center}
.result-val{font-family:var(--mono);font-size:22px;font-weight:500}
.result-lbl{font-size:10px;color:var(--text3);margin-top:3px}
.prob-item{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.prob-lbl{font-size:11px;color:var(--text2);width:220px;flex-shrink:0}
.prob-bar-o{flex:1;height:5px;border-radius:3px;background:var(--bg3);overflow:hidden}
.prob-bar-i{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--green))}
.prob-pct{font-family:var(--mono);font-size:10px;color:var(--text2);width:36px;text-align:right}

/* ── Modal ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .18s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rl);padding:22px;width:480px;max-width:96vw;transform:translateY(6px);transition:transform .18s;max-height:90vh;overflow-y:auto}
.overlay.open .modal{transform:translateY(0)}
.modal h3{font-size:14px;font-weight:500;margin-bottom:16px}
.fl{margin-bottom:12px}
.fl label{display:block;font-size:9px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.fi{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:7px 10px;font-size:13px;font-family:var(--sans);color:var(--text)}
.fi:focus{outline:none;border-color:var(--accent)}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fcheck{display:flex;align-items:center;gap:8px;font-size:12px;cursor:pointer}
.fcheck input{accent-color:var(--accent)}
.fa{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.color-row{display:flex;gap:5px;flex-wrap:wrap}
.cswatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent}
.cswatch.sel{border-color:#fff}

/* ── Projects panel ── */
.proj-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rl);padding:14px;margin-bottom:8px;cursor:pointer;transition:border-color .12s;position:relative}
.proj-card:hover{border-color:var(--border2)}
.proj-card.current{border-color:var(--accent)}
.proj-card-name{font-size:13px;font-weight:500;margin-bottom:4px}
.proj-card-meta{font-size:11px;color:var(--text3)}
.proj-card-actions{position:absolute;top:10px;right:10px;display:flex;gap:4px;opacity:0;transition:opacity .1s}
.proj-card:hover .proj-card-actions{opacity:1}

/* ── gcal status ── */
.gcal-status{font-size:11px;padding:8px 12px;border-radius:var(--r);margin-top:10px;display:none}
.gcal-status.show{display:block}
.gcal-status.loading{background:rgba(79,142,247,.1);color:var(--accent)}
.gcal-status.success{background:rgba(62,207,142,.1);color:var(--green)}
.gcal-status.error{background:rgba(232,85,85,.1);color:var(--red)}

/* ── Help ── */
.help-section{margin-bottom:20px}
.help-section h4{font-size:12px;font-weight:500;color:var(--accent);margin-bottom:8px;font-family:var(--mono)}
.help-section p,.help-section li{font-size:12px;color:var(--text2);line-height:1.7}
.help-section ul{padding-left:16px}
.help-section .tip{background:var(--bg3);border-left:2px solid var(--accent);padding:8px 12px;border-radius:0 var(--r) var(--r) 0;font-size:11px;color:var(--text2);margin:6px 0}
.formula-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;font-family:var(--mono);font-size:11px;color:var(--text2);margin:10px 0}
.scrolltbl{overflow-x:auto;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl)}
.sep{border:none;border-top:1px solid var(--border);margin:18px 0}
.empty{text-align:center;padding:40px;color:var(--text3);font-size:12px}
</style>
</head>
<body>
<div class="app">

<div class="topbar">
  <div class="logo">PLAN/</div>
  <div class="proj-switcher" onclick="switchView('projects',null)">
    <span id="topProjName">Loading…</span>
    <span style="color:var(--text3);font-size:10px">▾</span>
  </div>
  <div class="topbar-right">
    <span class="save-badge" id="saveBadge">●</span>
    <button class="btn btn-sm" onclick="exportJSON()">↓ JSON</button>
    <label class="btn btn-sm" style="cursor:pointer">↑ Import<input type="file" accept=".json" style="display:none" onchange="importJSON(event)"></label>
    <button class="btn btn-sm btn-gcal" onclick="exportToGCal()" id="gcalBtn">📅 Google Calendar</button>
    <button class="btn btn-sm" style="background:rgba(155,109,255,.15);color:var(--purple);border-color:rgba(155,109,255,.3)" onclick="exportPDF()">⬇ Download summary</button>
    <button class="btn btn-sm" onclick="switchView('help',null)">? Help</button>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="nav-sec">Views</div>
    <div class="nav-item active" id="nav-wbs" onclick="switchView('wbs',this)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      WBS tree
    </div>
    <div class="nav-item" id="nav-gantt" onclick="switchView('gantt',this)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="4" rx="1"/><rect x="3" y="10" width="12" height="4" rx="1"/><rect x="3" y="16" width="15" height="4" rx="1"/></svg>
      Gantt chart
    </div>
    <div class="nav-item" id="nav-pert" onclick="switchView('pert',this)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 20L7 14L11 16L16 8L21 4"/><circle cx="7" cy="14" r="1.5" fill="currentColor"/><circle cx="11" cy="16" r="1.5" fill="currentColor"/><circle cx="16" cy="8" r="1.5" fill="currentColor"/></svg>
      PERT analyzer
    </div>
    <div class="nav-item" id="nav-projects" onclick="switchView('projects',this)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 6h20M2 12h20M2 18h20"/></svg>
      All projects
    </div>
    <hr style="border:none;border-top:1px solid var(--border);margin:8px 0">
    <div class="nav-sec">Phases</div>
    <div id="sidePhases"></div>
    <div style="padding:6px 10px">
      <button class="btn btn-ghost btn-sm" style="width:100%;justify-content:center" onclick="openPhaseModal(null)">+ Add phase</button>
    </div>
    <div class="sidebar-footer">
      <button class="btn btn-ghost btn-sm" style="width:100%;justify-content:center;color:var(--text3)" onclick="switchView('help',null)">📖 User guide</button>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>
</div>

<!-- Task modal -->
<div class="overlay" id="taskModal">
<div class="modal">
  <h3 id="taskModalTitle">Add task</h3>
  <div class="fl"><label>Task name</label><input class="fi" id="tf-name" placeholder="e.g. Define system specs"></div>
  <div class="fg2">
    <div class="fl"><label>Phase</label><select class="fi" id="tf-phase"></select></div>
    <div class="fl"><label>Duration (days)</label><input class="fi" type="number" id="tf-days" value="3" min="1"></div>
  </div>
  <div class="fl"><label>Dependencies (comma-separated IDs, e.g. T1,T3)</label><input class="fi" id="tf-deps" placeholder="T1, T3"></div>
  <div class="fl"><label>Notes (optional)</label><textarea class="fi" id="tf-notes" rows="2" placeholder="Any details about this task…" style="resize:vertical"></textarea></div>
  <div class="fl"><label>Status</label>
    <select class="fi" id="tf-status">
      <option value="todo">Not started</option>
      <option value="inprogress">In progress</option>
      <option value="done">Done</option>
    </select>
  </div>
  <div class="fl"><label class="fcheck"><input type="checkbox" id="tf-cp"> Mark as critical path (CP)</label></div>
  <div class="fa">
    <button class="btn btn-danger btn-sm" id="tf-delete-btn" style="margin-right:auto;display:none" onclick="deleteTaskFromModal()">Delete task</button>
    <button class="btn" onclick="closeModal('taskModal')">Cancel</button>
    <button class="btn btn-primary" onclick="saveTask()">Save</button>
  </div>
</div>
</div>

<!-- Phase modal -->
<div class="overlay" id="phaseModal">
<div class="modal">
  <h3 id="phaseModalTitle">Add phase</h3>
  <div class="fl"><label>Phase name</label><input class="fi" id="pf-name" placeholder="e.g. Hardware procurement"></div>
  <div class="fl"><label>Color</label><div class="color-row" id="colorSwatches"></div></div>
  <div class="fa">
    <button class="btn btn-danger btn-sm" id="pf-delete-btn" style="margin-right:auto;display:none" onclick="deletePhaseFromModal()">Delete phase</button>

let store=loadStore();

function loadStore(){
  try{const r=localStorage.getItem(SK);if(r)return JSON.parse(r);}catch(e){}
  // migrate from old key
  try{const old=localStorage.getItem('planify_v2');if(old){const d=JSON.parse(old);d.projects&&d.projects.forEach(p=>{if(!p.startDate)p.startDate='';if(!p.skipWeekends)p.skipWeekends=true;p.phases&&p.phases.forEach(ph=>{if(!ph.notes)ph.notes='';});p.tasks&&p.tasks.forEach(t=>{if(!t.order)t.order=0;});});return d;}}catch(e){}

}
function saveStore(){
  try{localStorage.setItem(SK,JSON.stringify(store));const el=document.getElementById('saveBadge');if(el){el.textContent='✓ saved';el.className='save-badge ok';setTimeout(()=>{el.textContent='●';el.className='save-badge';},1200);}}catch(e){}
}

function proj(){return store.projects.find(p=>p.id===store.currentProjectId)||store.projects[0];}
function getPhase(id){return proj().phases.find(p=>p.id===id);}
function getTask(id){return proj().tasks.find(t=>t.id===id);}
function nextTid(){const ns=proj().tasks.map(t=>parseInt(t.id.replace('T',''))||0);return 'T'+(Math.max(0,...ns)+1);}
function nextPid(){const ns=proj().phases.map(p=>parseInt(p.id.replace('P',''))||0);return 'P'+(Math.max(0,...ns)+1);}

// ── CALENDAR HELPERS ────────────────────────────────────────────────────────
function addWorkdays(date,days,skipWeekends){
  let d=new Date(date);let added=0;
  while(added<days){d.setDate(d.getDate()+1);if(skipWeekends&&(d.getDay()===0||d.getDay()===6))continue;added++;}
  return d;
}
function workdaysBetween(a,b,skipWeekends){
  let d=new Date(a);let count=0;
  while(d<b){d.setDate(d.getDate()+1);if(skipWeekends&&(d.getDay()===0||d.getDay()===6))continue;count++;}
  return count;
}
function fmtDate(d){return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});}
function isoDate(d){return d.toISOString().split('T')[0];}

function computeSched(){
  const p=proj();
  const hasStart=p.startDate&&p.startDate.length===10;
  const startDate=hasStart?new Date(p.startDate):null;
  if(startDate)startDate.setHours(0,0,0,0);
  const skip=p.skipWeekends!==false;
  const esD={},efD={},esDays={},efDays={};

  function getEFdays(id){
    if(efDays[id]!==undefined)return efDays[id];
    const t=getTask(id);if(!t)return 0;
    let mx=0;(t.deps||[]).forEach(d=>{mx=Math.max(mx,getEFdays(d));});
    esDays[id]=mx;efDays[id]=mx+t.days;return efDays[id];
  }
  p.tasks.forEach(t=>getEFdays(t.id));
  const totalDays=p.tasks.length?Math.max(0,...p.tasks.map(t=>efDays[t.id]||0)):0;

  if(startDate){
    // Convert day offsets to actual calendar dates
    p.tasks.forEach(t=>{
      let s=new Date(startDate);let added=0;
      while(added<esDays[t.id]){s.setDate(s.getDate()+1);if(skip&&(s.getDay()===0||s.getDay()===6))continue;added++;}
      esD[t.id]=new Date(s);
      let e=new Date(s);added=0;
      while(added<t.days){e.setDate(e.getDate()+1);if(skip&&(e.getDay()===0||e.getDay()===6))continue;added++;}
      efD[t.id]=new Date(e);
    });
  }
  return{esDays,efDays,esD,efD,totalDays,startDate,skip};
}

// ── NAV ────────────────────────────────────────────────────────────────────
function switchView(view,el){
  currentView=view;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const navEl=document.getElementById('nav-'+view);if(navEl)navEl.classList.add('active');

}
function render(){
  updateSidebar();
  document.getElementById('topProjName').textContent=proj()?proj().name:'—';
  if(currentView==='wbs')renderWBS();
  else if(currentView==='gantt')renderGantt();
  else if(currentView==='pert')renderPert();
  else if(currentView==='projects')renderProjects();

}
function updateSidebar(){

    const cnt=p.tasks.filter(t=>t.phaseId===ph.id).length;

      <span style="width:6px;height:6px;border-radius:50%;background:${ph.color};flex-shrink:0"></span>

// ── PHASE RING SVG ──────────────────────────────────────────────────────────
function phaseRing(color,pct){
  const r=11,cx=14,cy=14,circ=2*Math.PI*r;
  const dash=circ*pct,gap=circ*(1-pct);
  return`<div class="phase-ring-wrap">
    <svg width="28" height="28" viewBox="0 0 28 28">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="2.5"/>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="2.5"
        stroke-dasharray="${dash.toFixed(1)} ${gap.toFixed(1)}" stroke-linecap="round" opacity=".85"/>
    </svg>
    <span class="phase-ring-dot" style="background:${color}"></span>
  </div>`;
}

// ── WBS ─────────────────────────────────────────────────────────────────────
function renderWBS(){
  const p=proj();if(!p){document.getElementById('content').innerHTML='<div class="empty">No project.</div>';return;}
  const sched=computeSched();
  const total=p.tasks.length,done=p.tasks.filter(t=>t.status==='done').length,cp=p.tasks.filter(t=>t.cp).length;
  const pct=total?Math.round(done/total*100):0;

  let html=`<div class="ph"><div>
    <div class="ph-title">Work breakdown structure ${p.isExample?'<span class="badge badge-example">example</span>':''}</div>
    <div class="progress-bar" style="width:200px"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div style="font-size:10px;color:var(--text3);font-family:var(--mono)">${done}/${total} complete · ${pct}%</div>
  </div>
  <div class="ph-actions">
    <div style="display:flex;align-items:center;gap:6px">
      <input type="date" id="startDateInput" class="fi" style="width:140px;font-size:11px;padding:4px 8px" value="${p.startDate||''}" onchange="updateStartDate(this.value)" title="Project start date">
      <label style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2);cursor:pointer;white-space:nowrap">
        <input type="checkbox" ${p.skipWeekends!==false?'checked':''} onchange="updateSkipWeekends(this.checked)" style="accent-color:var(--accent)"> Skip weekends
      </label>
    </div>
    <button class="btn btn-sm" onclick="openPhaseModal(null)">+ Phase</button>
    <button class="btn btn-sm btn-primary" onclick="openTaskModal(null)">+ Task</button>
  </div></div>
  <div class="metrics">
    <div class="metric"><div class="metric-val">${total}</div><div class="metric-lbl">Total tasks</div></div>
    <div class="metric"><div class="metric-val">${p.phases.length}</div><div class="metric-lbl">Phases</div></div>
    <div class="metric"><div class="metric-val">${sched.totalDays}</div><div class="metric-lbl">Est. working days</div></div>
    <div class="metric"><div class="metric-val">${cp}</div><div class="metric-lbl">CP tasks</div></div>
  </div>`;

  p.phases.forEach(ph=>{
    const tasks=p.tasks.filter(t=>t.phaseId===ph.id);
    const phDone=tasks.filter(t=>t.status==='done').length;
    const ringPct=tasks.length?phDone/tasks.length:0;
    const exp=ph.expanded!==false;
    html+=`<div class="wbs-phase">
      <div class="wbs-ph-hdr" onclick="togglePhase('${ph.id}')">
        ${phaseRing(ph.color,ringPct)}
        <input class="phase-name-edit" value="${escHtml(ph.name)}" onclick="event.stopPropagation()" onchange="updatePhaseName('${ph.id}',this.value)" title="Click to rename">
        <span class="phase-meta">${phDone}/${tasks.length} · ${tasks.reduce((s,t)=>s+t.days,0)}d</span>
        <button class="btn btn-ghost btn-icon btn-xs" onclick="event.stopPropagation();openPhaseModal('${ph.id}')" title="Edit phase color">🎨</button>
        <button class="btn btn-danger btn-icon btn-xs" onclick="event.stopPropagation();deletePhase('${ph.id}')" title="Delete phase">✕</button>
        <span class="exp-icon ${exp?'open':''}">▶</span>
      </div>`;

    if(exp){
      // Phase notes
      html+=`<div class="phase-notes-area">
        <textarea class="phase-notes-input" rows="1" placeholder="Phase notes… (goals, deliverables, reminders)" onclick="event.stopPropagation()" onchange="updatePhaseNotes('${ph.id}',this.value)">${escHtml(ph.notes||'')}</textarea>
      </div>`;

      html+=`<div class="wbs-tasks" id="phase-tasks-${ph.id}">`;
      if(!tasks.length)html+=`<div style="padding:8px 10px;font-size:11px;color:var(--text3)">No tasks — add one below.</div>`;
      tasks.forEach(t=>{
        const isDone=t.status==='done',isIP=t.status==='inprogress';
        const sdot=STATUS_COLORS[t.status]||'#606072';
        // Calendar date chip
        let dateChip='';
        if(sched.startDate&&sched.esD[t.id]&&sched.efD[t.id]){
          const esDate=sched.esD[t.id],efDate=sched.efD[t.id];
          let cls='task-date-chip';
          if(!isDone&&efDate<TODAY)cls+=' overdue';
          else if(!isDone&&esDate<=TODAY&&efDate>=TODAY)cls+=' today';
          else if(!isDone&&esDate>TODAY)cls+=' upcoming';
          dateChip=`<span class="${cls}" title="Scheduled ${fmtDate(esDate)} – ${fmtDate(efDate)}">${fmtDate(esDate)} – ${fmtDate(efDate)}</span>`;
        }
        html+=`<div class="wbs-task ${isDone?'done':''}" id="wtask-${t.id}" draggable="true"
          ondragstart="dragStart(event,'${t.id}','${ph.id}')"
          ondragover="dragOver(event,'${t.id}')"
          ondragleave="dragLeave(event)"
          ondrop="dragDrop(event,'${t.id}','${ph.id}')">
          <span class="drag-handle" title="Drag to reorder">⠿</span>
          <input type="checkbox" class="task-check ${isIP?'inprogress':''}" ${isDone?'checked':''} onchange="toggleTaskDone('${t.id}',this.checked)" title="${isDone?'Done':isIP?'In progress':'Not started'}">
          <span class="task-id-lbl">${t.id}</span>
          <input class="task-name-edit ${isIP?'inprogress':''}" value="${escHtml(t.name)}" onchange="updateTaskField('${t.id}','name',this.value)" title="Click to rename">
          ${t.cp?'<span class="badge badge-cp">CP</span>':''}
          <span class="status-dot" style="background:${sdot}" title="${t.status}"></span>
          <span style="font-size:9px;color:var(--text3);font-family:var(--mono)">${(t.deps&&t.deps.length)?'→'+t.deps.join(','):''}</span>
          ${dateChip}
          <button class="task-days-pill" onclick="promptDays('${t.id}',${t.days})" title="Click to change duration">⏱ ${t.days} days</button>
          <button class="btn btn-ghost btn-icon btn-xs" onclick="openTaskModal('${t.id}')" title="Edit task">✎</button>
          <button class="btn btn-danger btn-icon btn-xs" onclick="deleteTask('${t.id}')" title="Delete task">✕</button>
        </div>
        ${t.notes?`<div class="task-notes-row">📝 ${escHtml(t.notes)}</div>`:''}`;
      });
      html+=`<div style="padding:4px 0 2px"><button class="btn btn-ghost btn-xs" onclick="openTaskModal(null,'${ph.id}')">+ add task to ${escHtml(ph.name)}</button></div>`;
      html+=`</div>`;
    }
    html+=`</div>`;
  });
  if(!p.phases.length)html+=`<div class="empty">No phases yet. Click "+ Phase" to start.</div>`;
  document.getElementById('content').innerHTML=html;
}

function togglePhase(id){const ph=getPhase(id);if(ph){ph.expanded=ph.expanded===false;saveStore();renderWBS();}}
function updatePhaseName(id,val){const ph=getPhase(id);if(ph){ph.name=val.trim()||ph.name;saveStore();updateSidebar();}}
function updatePhaseNotes(id,val){const ph=getPhase(id);if(ph){ph.notes=val;saveStore();}}
function updateTaskField(id,field,val){const t=getTask(id);if(t){t[field]=val;saveStore();renderWBS();}}
function toggleTaskDone(id,checked){const t=getTask(id);if(t){t.status=checked?'done':(t.status==='inprogress'?'todo':'todo');saveStore();renderWBS();}}
function updateStartDate(val){const p=proj();p.startDate=val;saveStore();renderWBS();}
function updateSkipWeekends(val){const p=proj();p.skipWeekends=val;saveStore();renderWBS();}
function promptDays(id,current){
  const val=prompt('Duration for this task (working days):',current);
  if(val===null)return;const n=parseInt(val);
  if(!n||n<1){alert('Please enter a number of 1 or more.');return;}
  updateTaskField(id,'days',n);
}

// ── DRAG & DROP ──────────────────────────────────────────────────────────────
function dragStart(e,taskId,phaseId){
  dragSrcTask=taskId;dragSrcPhase=phaseId;
  e.dataTransfer.effectAllowed='move';
  setTimeout(()=>{const el=document.getElementById('wtask-'+taskId);if(el)el.classList.add('dragging');},0);
}
function dragOver(e,taskId){
  e.preventDefault();e.dataTransfer.dropEffect='move';
  document.querySelectorAll('.wbs-task').forEach(el=>el.classList.remove('drag-over'));
  if(taskId!==dragSrcTask){const el=document.getElementById('wtask-'+taskId);if(el)el.classList.add('drag-over');}
}
function dragLeave(e){e.currentTarget.classList.remove('drag-over');}
function dragDrop(e,targetId,targetPhase){
  e.preventDefault();
  document.querySelectorAll('.wbs-task').forEach(el=>{el.classList.remove('drag-over');el.classList.remove('dragging');});
  if(!dragSrcTask||dragSrcTask===targetId)return;
  const p=proj();
  const tasks=p.tasks;
  const srcIdx=tasks.findIndex(t=>t.id===dragSrcTask);
  const tgtIdx=tasks.findIndex(t=>t.id===targetId);
  if(srcIdx<0||tgtIdx<0)return;
  const [moved]=tasks.splice(srcIdx,1);
  // Move to same phase as target
  moved.phaseId=targetPhase;
  const newTgtIdx=tasks.findIndex(t=>t.id===targetId);
  tasks.splice(newTgtIdx,0,moved);
  dragSrcTask=null;dragSrcPhase=null;
  saveStore();renderWBS();
}

// ── GANTT ────────────────────────────────────────────────────────────────────
function renderGantt(){
  const p=proj();if(!p){document.getElementById('content').innerHTML='<div class="empty">No project.</div>';return;}
  const sched=computeSched();const total=sched.totalDays||1;
  const pct=d=>(d/total*100).toFixed(2)+'%';
  const step=Math.max(1,Math.round(total/10));

  // Build tick labels (dates or day numbers)
  let ticks='';
  for(let d=0;d<=total;d+=step){
    let lbl;
    if(sched.startDate){
      let dt=new Date(sched.startDate);let added=0;
      while(added<d){dt.setDate(dt.getDate()+1);if(sched.skip&&(dt.getDay()===0||dt.getDay()===6))continue;added++;}
      lbl=fmtDate(dt);
    } else lbl='d'+d;
    ticks+=`<div class="g-date-lbl" style="left:${pct(d)}"><div class="g-date-line"></div><div class="g-date-txt">${lbl}</div></div>`;
  }

  // Today line
  let todayLine='';
  if(sched.startDate){
    const todayOffset=workdaysBetween(sched.startDate,TODAY,sched.skip);
    if(todayOffset>=0&&todayOffset<=total){
      const lp=(todayOffset/total*100).toFixed(2)+'%';
      todayLine=`<div class="g-today-line" style="left:${lp}"></div><div class="g-today-lbl" style="left:${lp}">today</div>`;
    }
  }

  let rows='';
  p.phases.forEach(ph=>{
    const tasks=p.tasks.filter(t=>t.phaseId===ph.id);
    rows+=`<div class="g-ph-row"><div class="g-name g-ph-name" style="color:${ph.color}">${escHtml(ph.name)}</div><div class="g-bar-wrap"></div></div>`;
    tasks.forEach(t=>{
      const s=sched.esDays[t.id]||0,e=sched.efDays[t.id]||t.days;
      const l=pct(s),w=pct(e-s);
      const col=t.status==='done'?'#3ecf8e':(t.status==='inprogress'?'#f5a623':(t.cp?'#4f8ef7':'#2a6e50'));
      let tooltip=escHtml(t.name);
      if(sched.startDate&&sched.esD[t.id])tooltip+=`: ${fmtDate(sched.esD[t.id])} – ${fmtDate(sched.efD[t.id])}`;
      rows+=`<div class="g-task-row ${t.status==='done'?'done-row':''}">
        <div class="g-name" style="padding-left:20px;color:${t.status==='done'?'var(--text3)':'var(--text2)'}">${t.id}: ${escHtml(t.name)}</div>
        <div class="g-bar-wrap">${todayLine}
          <div class="g-bar" style="left:${l};width:${w};background:${col}" title="${tooltip}">${e-s}d</div>
        </div>
      </div>`;
    });
  });

  document.getElementById('content').innerHTML=`
  <div class="ph"><div class="ph-title">Gantt chart</div>
    <div style="font-size:11px;color:var(--text3)">CPM forward pass · <strong style="color:var(--text2)">${total} working days</strong>${sched.startDate?` · starts ${fmtDate(sched.startDate)}`:'&nbsp;— <span style="color:var(--amber)">set a start date in WBS to see calendar dates</span>'}</div>
  </div>
  <div class="metrics" style="grid-template-columns:repeat(3,1fr)">
    <div class="metric"><div class="metric-val">${total}</div><div class="metric-lbl">Duration (days)</div></div>
    <div class="metric"><div class="metric-val">${p.tasks.filter(t=>t.cp).length}</div><div class="metric-lbl">CP tasks</div></div>

// ── PERT ─────────────────────────────────────────────────────────────────────
function renderPert(){
  const p=proj();if(!p){document.getElementById('content').innerHTML='<div class="empty">No project.</div>';return;}
  let cpSum=0,cpVar=0;let rows='';
  p.pert.forEach((entry,i)=>{
    const task=getTask(entry.taskId);
    const te=(entry.a+4*entry.m+entry.b)/6,va=Math.pow((entry.b-entry.a)/6,2);
    const isCP=task&&task.cp;
    if(isCP){cpSum+=te;cpVar+=va;}
    rows+=`<tr class="${isCP?'is-cp':''}">
      <td><span style="font-size:9px;color:var(--text3);font-family:var(--mono);margin-right:5px">${entry.taskId}</span>${task?escHtml(task.name):'<em style="color:var(--text3)">(deleted)</em>'}</td>
      <td><input class="pert-inp" type="number" value="${entry.a}" min="0" onchange="pertUpd(${i},'a',+this.value)"></td>
      <td><input class="pert-inp" type="number" value="${entry.m}" min="0" onchange="pertUpd(${i},'m',+this.value)"></td>
      <td><input class="pert-inp" type="number" value="${entry.b}" min="0" onchange="pertUpd(${i},'b',+this.value)"></td>
      <td style="font-family:var(--mono);font-weight:500">${te.toFixed(1)}</td>
      <td style="font-family:var(--mono);color:var(--text2)">${va.toFixed(2)}</td>
      <td>${isCP?'<span class="badge badge-cp">CP</span>':'<span class="badge" style="background:var(--bg3);color:var(--text3);border:1px solid var(--border)">—</span>'}</td>
      <td><button class="btn btn-danger btn-icon btn-xs" onclick="pertDel(${i})" title="Remove">✕</button></td>
    </tr>`;
  });
  const sd=Math.sqrt(cpVar);
  function nCDF(z){const t=1/(1+.2316419*Math.abs(z));const poly=t*(0.319381530+t*(-0.356563782+t*(1.781477937+t*(-1.821255978+t*1.330274429))));const p=1-(1/Math.sqrt(2*Math.PI))*Math.exp(-.5*z*z)*poly;return z>=0?p:1-p;}
  const probs=[
    {label:`Day ${cpSum.toFixed(1)} — expected (50%)`,prob:50},
    {label:`Day ${(cpSum+sd).toFixed(1)} — te + 1σ`,prob:nCDF(1)*100},
    {label:`Day ${(cpSum+1.645*sd).toFixed(1)} — 95th percentile`,prob:95},
    {label:`Day ${(cpSum+2*sd).toFixed(1)} — te + 2σ`,prob:nCDF(2)*100},
  ];
  const unusedTasks=p.tasks.filter(t=>!p.pert.find(e=>e.taskId===t.id));
  const addOpts=unusedTasks.map(t=>`<option value="${t.id}">${t.id}: ${t.name}</option>`).join('');
  document.getElementById('content').innerHTML=`
  <div class="ph"><div class="ph-title">PERT analyzer</div></div>
  <div class="formula-box">tₑ = (a + 4m + b) / 6 &nbsp;·&nbsp; σ² = ((b−a)/6)² &nbsp;·&nbsp; Completion probability via normal distribution on CP sum</div>
  <div class="scrolltbl"><table class="pert-tbl">
    <thead><tr><th>Activity</th><th>Optimistic a</th><th>Most likely m</th><th>Pessimistic b</th><th>tₑ</th><th>σ²</th><th>CP?</th><th></th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div>
  ${addOpts?`<div style="display:flex;gap:8px;align-items:center;margin-top:10px">
    <select class="fi" id="pertAddSel" style="width:220px">${addOpts}</select>
    <button class="btn btn-sm btn-primary" onclick="pertAdd()">+ Add activity</button>
  </div>`:''}
  <hr class="sep">
  <div class="result-grid">
    <div class="result-card"><div class="result-val" style="color:var(--accent)">${cpSum.toFixed(1)}</div><div class="result-lbl">Expected CP duration</div></div>
    <div class="result-card"><div class="result-val" style="color:var(--amber)">${cpVar.toFixed(2)}</div><div class="result-lbl">Total variance σ²</div></div>
    <div class="result-card"><div class="result-val" style="color:var(--green)">${sd.toFixed(2)}</div><div class="result-lbl">Std deviation σ</div></div>
  </div>
  <div style="margin-top:16px">
    <div style="font-size:9px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px">Completion probability</div>
    ${probs.map(p=>`<div class="prob-item"><div class="prob-lbl">${p.label}</div><div class="prob-bar-o"><div class="prob-bar-i" style="width:${p.prob.toFixed(1)}%"></div></div><div class="prob-pct">${p.prob.toFixed(1)}%</div></div>`).join('')}
  </div>`;
}
function pertUpd(i,f,v){proj().pert[i][f]=v;saveStore();renderPert();}
function pertDel(i){proj().pert.splice(i,1);saveStore();renderPert();}
function pertAdd(){const sel=document.getElementById('pertAddSel');if(!sel||!sel.value)return;proj().pert.push({taskId:sel.value,a:1,m:3,b:6});saveStore();renderPert();}

// ── GOOGLE CALENDAR EXPORT ───────────────────────────────────────────────────
async function exportToGCal(){
  const p=proj();
  if(!p.startDate){alert('Please set a project start date in the WBS view first — otherwise we cannot calculate real calendar dates for each task.');return;}
  const sched=computeSched();
  const btn=document.getElementById('gcalBtn');
  btn.textContent='📅 Exporting…';btn.disabled=true;

  const tasks=p.tasks.filter(t=>sched.esD[t.id]&&sched.efD[t.id]);
  let created=0,failed=0;

  for(const t of tasks){
    const startIso=isoDate(sched.esD[t.id]);
    // Google Calendar all-day events need end = day after last day
    const endDate=new Date(sched.efD[t.id]);endDate.setDate(endDate.getDate()+1);
    const endIso=isoDate(endDate);
    const desc=[
      `Project: ${p.name}`,
      `Phase: ${(getPhase(t.phaseId)||{name:'—'}).name}`,
      `Duration: ${t.days} working days`,
      `Status: ${t.status}`,
      t.cp?'⚡ Critical path task':'',
      t.deps&&t.deps.length?`Depends on: ${t.deps.join(', ')}` : '',
      t.notes?`Notes: ${t.notes}`:'',
    ].filter(Boolean).join('\n');

    try{
      const res=await fetch('https://calendarmcp.googleapis.com/mcp/v1',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          jsonrpc:'2.0',id:1,method:'tools/call',
          params:{name:'create_event',arguments:{
            summary:`[${p.name.substring(0,20)}] ${t.name}`,
            description:desc,
            start:{date:startIso},
            end:{date:endIso},
            colorId: t.cp?'11':(t.status==='done'?'2':'1')
          }}
        })
      });
      if(res.ok)created++;else failed++;
    }catch(e){failed++;}
  }

  btn.textContent='📅 Google Calendar';btn.disabled=false;
  if(failed===0)alert(`✅ ${created} tasks exported to Google Calendar!`);
  else alert(`Exported ${created} tasks. ${failed} failed — you may need to re-authenticate Google Calendar in your Claude settings.`);
}

function openTaskModal(id,defaultPhaseId){

    document.getElementById('tf-deps').value=(t.deps||[]).join(', ');
    document.getElementById('tf-notes').value=t.notes||'';
    document.getElementById('tf-status').value=t.status||'todo';
    document.getElementById('tf-cp').checked=!!t.cp;

function saveTask(){
  const name=document.getElementById('tf-name').value.trim();
  if(!name){alert('Task name required.');return;}
  const days=Math.max(1,parseInt(document.getElementById('tf-days').value)||1);
  const phaseId=document.getElementById('tf-phase').value;
  const deps=document.getElementById('tf-deps').value.split(',').map(s=>s.trim()).filter(Boolean);
  const notes=document.getElementById('tf-notes').value.trim();
  const status=document.getElementById('tf-status').value;
  const cp=document.getElementById('tf-cp').checked;
  if(editingTaskId){Object.assign(getTask(editingTaskId),{name,days,phaseId,deps,notes,status,cp});}
  else proj().tasks.push({id:nextTid(),name,phaseId,days,cp,deps,status,notes});
  saveStore();closeModal('taskModal');render();
}
function deleteTask(id){if(!confirm('Delete this task?'))return;const p=proj();p.tasks=p.tasks.filter(t=>t.id!==id);p.pert=p.pert.filter(e=>e.taskId!==id);p.tasks.forEach(t=>{t.deps=(t.deps||[]).filter(d=>d!==id);});saveStore();render();}

    tasks.forEach(t=>{
      const dateStr=(sched.startDate&&sched.esD[t.id])?` · ${fmtDate(sched.esD[t.id])} – ${fmtDate(sched.efD[t.id])}`:'';
      wbsHtml+=`<div style="padding:6px 12px 6px 24px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:8px;font-size:11px">
        <span style="color:#999;width:24px;font-family:monospace">${t.id}</span>
        <span style="${t.status==='done'?'text-decoration:line-through;color:#999':''}flex:1">${t.status==='done'?'✅ ':''}${escHtml(t.name)}</span>
        ${t.cp?'<span style="font-size:9px;background:#e8f0fe;color:#1a56db;padding:1px 5px;border-radius:3px;font-weight:600">CP</span>':''}
        <span style="color:#666;font-family:monospace;font-size:10px">${t.days}d${dateStr}</span>
      </div>`;
    });
    wbsHtml+='</div>';
  });

  let ganttRows='';
  p.phases.forEach(ph=>{
    const tasks=p.tasks.filter(t=>t.phaseId===ph.id);
    ganttRows+=`<tr style="background:#f8f8f8"><td style="padding:5px 10px;font-weight:600;font-size:11px;color:${ph.color};width:180px;border-right:1px solid #ddd">${escHtml(ph.name)}</td><td></td></tr>`;
    tasks.forEach(t=>{
      const s=sched.esDays[t.id]||0,e=sched.efDays[t.id]||t.days;
      const col=t.status==='done'?'#3ecf8e':(t.status==='inprogress'?'#f5a623':(t.cp?'#4f8ef7':'#2a8a5c'));
      ganttRows+=`<tr><td style="padding:4px 10px 4px 20px;font-size:10px;color:#555;border-right:1px solid #ddd;max-width:180px;overflow:hidden">${t.id}: ${escHtml(t.name)}</td>
        <td style="padding:4px 6px;position:relative">
          <div style="margin-left:${(s/total*100).toFixed(1)}%;width:${((e-s)/total*100).toFixed(1)}%;background:${col};height:12px;border-radius:2px;min-width:4px;display:flex;align-items:center;padding:0 4px">
            <span style="font-size:8px;color:rgba(255,255,255,.9);font-family:monospace">${e-s}d</span>
          </div>
        </td></tr>`;
    });
  });

  let pertRows='',cpSum=0,cpVar=0;
  p.pert.forEach(entry=>{
    const task=getTask(entry.taskId);
    const te=(entry.a+4*entry.m+entry.b)/6,va=Math.pow((entry.b-entry.a)/6,2);
    const isCP=task&&task.cp;if(isCP){cpSum+=te;cpVar+=va;}
    pertRows+=`<tr style="${isCP?'background:#f0f5ff':''}">
      <td style="padding:5px 8px;font-size:10px;border-bottom:1px solid #eee">${task?escHtml(task.name):'(deleted)'}</td>
      <td style="padding:5px 8px;font-family:monospace;text-align:center;font-size:10px;border-bottom:1px solid #eee">${entry.a}</td>
      <td style="padding:5px 8px;font-family:monospace;text-align:center;font-size:10px;border-bottom:1px solid #eee">${entry.m}</td>
      <td style="padding:5px 8px;font-family:monospace;text-align:center;font-size:10px;border-bottom:1px solid #eee">${entry.b}</td>
      <td style="padding:5px 8px;font-family:monospace;text-align:center;font-weight:600;font-size:10px;border-bottom:1px solid #eee">${te.toFixed(1)}</td>
      <td style="padding:5px 8px;font-family:monospace;text-align:center;font-size:10px;border-bottom:1px solid #eee">${va.toFixed(2)}</td>
      <td style="padding:5px 8px;text-align:center;font-size:9px;border-bottom:1px solid #eee">${isCP?'<span style="background:#dbeafe;color:#1d4ed8;padding:1px 5px;border-radius:3px;font-weight:700">CP</span>':'—'}</td>
    </tr>`;
  });
  const sd=Math.sqrt(cpVar);

  const win=window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${escHtml(p.name)} — Summary</title>
  <style>body{font-family:'Segoe UI',Arial,sans-serif;color:#1a1a1a;padding:32px;max-width:960px;margin:0 auto}
  h1{font-size:22px;font-weight:700;margin-bottom:4px}h2{font-size:14px;font-weight:600;color:#1a56db;margin:28px 0 10px;padding-bottom:5px;border-bottom:2px solid #e0e7ff;text-transform:uppercase;letter-spacing:.05em}
  .meta{font-size:11px;color:#666;margin-bottom:20px}.stat-row{display:flex;gap:16px;margin-bottom:24px}
  .stat{background:#f5f7fa;border:1px solid #e0e4eb;border-radius:6px;padding:10px 16px;text-align:center;flex:1}
  .stat-v{font-size:22px;font-weight:700;font-family:monospace}.stat-l{font-size:9px;color:#666;text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
  .prog-bar{height:8px;border-radius:4px;background:#e5e7eb;overflow:hidden;margin:10px 0}
  .prog-fill{height:100%;background:linear-gradient(90deg,#1a56db,#0ea47a);border-radius:4px}
  table{width:100%;border-collapse:collapse}th{background:#f0f4ff;color:#374151;font-size:10px;padding:7px 8px;text-align:left;font-weight:600;border-bottom:1px solid #d1d5db}
  .formula{background:#f5f7fa;border:1px solid #e0e4eb;border-radius:4px;padding:8px 12px;font-family:monospace;font-size:10px;color:#374151;margin:8px 0}
  .result-row{display:flex;gap:12px;margin:12px 0}.result-box{flex:1;background:#f0f5ff;border:1px solid #c7d7f8;border-radius:6px;padding:10px;text-align:center}
  .result-v{font-size:18px;font-weight:700;font-family:monospace;color:#1a56db}.result-l{font-size:9px;color:#666;margin-top:2px}
  @media print{@page{margin:20px}button{display:none}}</style>
  </head><body>
  <div style="display:flex;align-items:flex-start;justify-content:space-between">
    <div><h1>${escHtml(p.name)}</h1><div class="meta">Generated ${new Date().toLocaleDateString('en-GB',{year:'numeric',month:'long',day:'numeric'})} · PLAN/ project planner${p.startDate?' · Start: '+fmtDate(new Date(p.startDate)):''}</div></div>
    <button onclick="window.print()" style="padding:8px 18px;background:#1a56db;color:#fff;border:none;border-radius:5px;cursor:pointer;font-size:12px">🖨 Print / Save PDF</button>
  </div>
  <div class="stat-row">
    <div class="stat"><div class="stat-v">${p.tasks.length}</div><div class="stat-l">Tasks</div></div>
    <div class="stat"><div class="stat-v">${p.phases.length}</div><div class="stat-l">Phases</div></div>
    <div class="stat"><div class="stat-v">${total}</div><div class="stat-l">Working days</div></div>
    <div class="stat"><div class="stat-v">${progress}%</div><div class="stat-l">Complete</div></div>
  </div>
  <div class="prog-bar"><div class="prog-fill" style="width:${progress}%"></div></div>
  <h2>Work breakdown structure</h2>${wbsHtml}
  <h2>Gantt chart</h2>
  <div style="overflow-x:auto"><table><thead><tr><th style="width:180px">Task</th><th>Timeline (${total} days total)</th></tr></thead><tbody>${ganttRows}</tbody></table></div>
  <h2>PERT analysis</h2>
  <div class="formula">tₑ = (a + 4m + b) / 6 · σ² = ((b−a)/6)²</div>
  <table><thead><tr><th>Activity</th><th>a</th><th>m</th><th>b</th><th>tₑ</th><th>σ²</th><th>CP</th></tr></thead><tbody>${pertRows}</tbody></table>
  <div class="result-row">
    <div class="result-box"><div class="result-v">${cpSum.toFixed(1)}</div><div class="result-l">Expected CP duration</div></div>
    <div class="result-box"><div class="result-v">${cpVar.toFixed(2)}</div><div class="result-l">Total variance σ²</div></div>
    <div class="result-box"><div class="result-v">${sd.toFixed(2)}</div><div class="result-l">Std deviation σ</div></div>
  </div>
  <p style="font-size:10px;color:#888;margin-top:8px">50% finish by day ${cpSum.toFixed(1)} · 84% by day ${(cpSum+sd).toFixed(1)} · 97.7% by day ${(cpSum+2*sd).toFixed(1)}</p>
  </body></html>`);win.document.close();
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.overlay.open').forEach(o=>o.classList.remove('open'));});
document.querySelectorAll('.overlay').forEach(el=>el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');}));
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
